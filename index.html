<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página no GitHub</title>
    <style>
        /* Estilos básicos para deixar a página bonita */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #24292e; /* Cor padrão do GitHub */
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1em;
            color: #586069;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ea44f; /* Verde de sucesso do GitHub */
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Olá, Mundo! 🚀</h1>
        <p>Esta é a minha primeira página hospedada diretamente no GitHub Pages.</p>
        <p>Você pode editar este arquivo para colocar o conteúdo que quiser.</p>
        <a href="https://github.com" target="_blank" class="btn">Visitar meu GitHub</a>
    </div>

</body>
</html>
